---
ikerlan-connector-?:
  enabled: true
  seedTestdata: false
  nameOverride: ikerlan-connector-?
  secrets:
    edc-wallet-secret: changeme
  tractusx-connector:
    nameOverride: ikerlan-connector-?-edc
    participant:
      id: BPNL000000000065
    iatp:
      id: did:web:ssi-dim-wallet-stub.mondragon-x.com:BPNL000000000065
      trustedIssuers:
        - did:web:ssi-dim-wallet-stub.mondragon-x.com:BPNL00000003CRHK
      sts:
        dim:
          url: https://ssi-dim-wallet-stub.mondragon-x.com/api/sts
        oauth:
          token_url: https://ssi-dim-wallet-stub.mondragon-x.com/oauth/token
          client:
            id: BPNL000000000065
            secret_alias: edc-wallet-secret
    controlplane:
      env:
        TX_IAM_IATP_CREDENTIALSERVICE_URL: https://ssi-dim-wallet-stub.mondragon-x.com/api
        EDC_IAM_DID_WEB_USE_HTTPS: false
      bdrs:
        server:
          url: https://ssi-dim-wallet-stub.mondragon-x.com/api/v1/directory
      endpoints:
        management:
          authKey: TEST1
      ingresses:
        - enabled: true
          hostname: "control-plane-connector?.dataspace-ikerlan.es"
          endpoints:
            - default
            - protocol
            - management
          className: "nginx"
          tls:
            enabled: true
            secretName: "control-plane-connector?"
    dataplane:
      env:
        TX_IAM_IATP_CREDENTIALSERVICE_URL: https://ssi-dim-wallet-stub.mondragon-x.com/api
        EDC_IAM_DID_WEB_USE_HTTPS: false
      ingresses:
        - enabled: true
          hostname: "data-plane-connector?.dataspace-ikerlan.es"
          endpoints:
            - default
            - public
          className: "nginx"
          tls:
            enabled: true
            secretName: "data-plane-connector?"
      token:
        signer:
          privatekey_alias: tokenSignerPrivateKey
        verifier:
          publickey_alias: tokenSignerPublicKey
    postgresql:
      nameOverride: ikerlan-connector-?-db
      jdbcUrl: "jdbc:postgresql://{{ .Release.Name }}-ikerlan-connector-?-db:5432/edc"
      auth:
        password: "dbpassworddataconsumerone"
        postgresPassword: "dbpassworddataconsumerone"
    vault:
      hashicorp:
        url: http://edc-ikerlan-connector-?-vault:8200
      secretNames:
        transferProxyTokenSignerPrivateKey: tokenSignerPrivateKey
        transferProxyTokenSignerPublicKey: tokenSignerPublicKey
        transferProxyTokenEncryptionAesKey: tokenEncryptionAesKey

  vault:
    nameOverride: edc-ikerlan-connector-?-vault
    fullnameOverride: edc-ikerlan-connector-?-vault
    enabled: true
    server:
      postStart: []

  digital-twin-registry:
    enabled: false
    nameOverride: dataprovider-dtr
    postgresql:
      nameOverride: dataprovider-dtr-db
      auth:
        password: "dbpassworddtrdataprovider"
        existingSecret: dataprovider-secret-dtr-postgres-init
    registry:
      host: {URL-DEL-DIGITAL-TWIN-REGISTRY}
      ingress:
        enabled: true
        urlPrefix: /
        tls: true

  simple-data-backend:
    enabled: false

---
portal:
  enabled: true
  replicaCount: 1
  postgresql:
    nameOverride: "portal-backend-postgresql"
    architecture: standalone
    auth:
      password: "dbpasswordportal"
      portalPassword: "dbpasswordportal"
      replicationPassword: "dbpasswordportal"
      provisioningPassword: "dbpasswordportal"
    primary:
      persistence:
        enabled: true
  portalAddress: "https://portal.mondragon-x.com"
  portalBackendAddress: &portal_backend_address "https://portal-backend.mondragon-x.com"
  # Address of the centralidp, without the /auth path
  centralidp:
    address: "https://centralidp.mondragon-x.com"
  # Address of the sharedidp, without the /auth path
  sharedidpAddress: "https://sharedidp.mondragon-x.com"
  semanticsAddress: "https://semantics.mondragon-x.com"
  bpdm:
    poolAddress: "https://business-partners.mondragon-x.com"
    poolApiPath: "/pool/v6"
    portalGateAddress: "https://business-partners.mondragon-x.com"
    portalGateApiPath: "/gate/v6"
  custodianAddress: &wallet_address "https://ssi-dim-wallet-stub.mondragon-x.com"
  # -- Provide the configuration of the dim wrapper address
  # Actualmente no lo vamos a utilizar, pero lo dejamos aquí por si en un futuro lo necesitamos
  # Razon en el documento SSI-CREDENTIAL-ISSUER.md -> Respuesta de Tractus-X sobre MIW y DIM
  dimWrapper:
    baseAddress: "https://ssi-dim-wallet-stub.mondragon-x.com"
    apiPath: "/api/dim"
    tokenAddress: "https://ssi-dim-wallet-stub.mondragon-x.com/oauth/token"
  decentralIdentityManagementAuthAddress: "https://ssi-dim-wallet-stub.mondragon-x.com/api/sts"
  sdfactoryAddress: "https://sdfactory.mondragon-x.com"
  clearinghouseAddress: "https://validation.mondragon-x.com"
  clearinghouseTokenAddress: "https://someiam.mondragon-x.com/realms/example/protocol/openid-connect/token"
  issuerComponentAddress: "https://ssi-credential-issuer.mondragon-x.com"
  # bpnDidResolver:
  #   managementApiAddress: "http://bdrs-server:8081"
  #   directoryApiAddress: "http://bdrs-server:8082"
  frontend:
    centralidpAuthPath: "/auth"
    ingress:
      enabled: true
      annotations:
        # uncomment the following line for tls
        # cert-manager.io/cluster-issuer: "my-ca-issuer"
        nginx.ingress.kubernetes.io/rewrite-target: "/$1"
        nginx.ingress.kubernetes.io/use-regex: "true"
        nginx.ingress.kubernetes.io/enable-cors: "true"
        nginx.ingress.kubernetes.io/cors-allow-origin: "https://*.mondragon-x.com, http://*.mondragon-x.com"
      tls:
        - secretName: "portal.mondragon-x.com-tls"
          hosts:
            - "portal.mondragon-x.com"
      hosts:
        - host: "portal.mondragon-x.com"
          paths:
            - path: "/(.*)"
              pathType: "ImplementationSpecific"
              backend:
                service: "portal"
                port: 8080
            - path: "/registration/(.*)"
              pathType: "ImplementationSpecific"
              backend:
                service: "registration"
                port: 8080
            - path: "/((assets|documentation)/.*)"
              pathType: "ImplementationSpecific"
              backend:
                service: "assets"
                port: 8080
  backend:
    dotnetEnvironment: "Development"
    useDimWallet: true
    keycloak:
      central:
        # The clientId and clientSecret backend uses to authenticate against the centralidp Keycloak
        # You must specify the technical user with the required roles for the backend (realm-management)
        clientId: "sa-cl1-reg-2"
        clientSecret: "changeme"
        jwtBearerOptions:
          requireHttpsMetadata: "false"
      shared:
        clientId: "sa-cl1-reg-1"
        clientSecret: "changeme"
    registration:
      # Is Central-IDPs name for the Registration client
      # The Registration service will use that name to check for existing client permissions
      keycloakClientId: "Cl1-CX-Registration"
      logging:
        default: "Debug"
        bpdmLibrary: "Debug"
        registrationService: "Debug"
      serviceAccount:
        encryptionConfigs:
          index0:
            encryptionKey: "deb8261ec7b89c344f1c5ef5a11606e305f14e0d231b1357d90ad0180c5081d3"
      swaggerEnabled: true
    administration:
      logging:
        default: "Debug"
        businessLogic: "Debug"
        sdfactoryLibrary: "Debug"
        bpdmLibrary: "Debug"
        custodianLibrary: "Debug"
      serviceAccount:
        encryptionConfigs:
          index0:
            encryptionKey: "deb8261ec7b89c344f1c5ef5a11606e305f14e0d231b1357d90ad0180c5081d3"
      issuerdid: &issuer_did "did:web:ssi-dim-wallet-stub.mondragon-x.com:BPNL00000003CRHK"
      swaggerEnabled: true
    appmarketplace:
      logging:
        default: "Debug"
        offersLibrary: "Debug"
      swaggerEnabled: true
      resources:
        # requests:
        #   cpu: 15m
        #   memory: 445M
        limits:
          memory: 600M
    services:
      logging:
        default: "Debug"
        offersLibrary: "Debug"
      swaggerEnabled: true
    notification:
      logging:
        default: "Debug"
      swaggerEnabled: true
    processesworker:
      # Responsable de editar los templates de los Emails
      clearinghouseConnectDisabled: true
      resources:
        limits:
          cpu: 1000m
          memory: 1500M
      logging:
        default: "Debug"
        processesLibrary: "Debug"
        bpdmLibrary: "Debug"
        clearinghouseLibrary: "Debug"
        custodianLibrary: "Debug"
        sdfactoryLibrary: "Debug"
        offerProvider: "Debug"
      bpdm:
        # The clientId and clientSecret processesworker uses to authenticate against the centralidp Keycloak
        # You must specify the technical user with the required roles for the interaction with the bpdm
        clientId: &bpdmAdminClientId "sa-cl7-cx-5"
        clientSecret: &bpdmAdminClientSecret "changeme"
      # -- no configuration for clearinghouse because it's an external component
      # clientId and clientSecret aren't in the centralidp Keycloak
      # clearinghouse:
      #   clientId: "clearinghouse-client-id"
      #   clientSecret: ""
      custodian:
        # You must specify the technical user with the required roles for the interaction with the managed-identity-wallet
        clientId: "sa-cl5-custodian-2"
        clientSecret: "changeme"
      sdfactory:
        issuerBpn: "BPNL00000003CRHK"
        # You must specify the technical user with the required roles for the interaction with the sdfactory
        clientId: "sa-cl8-cx-1"
        clientSecret: "changeme"
      offerprovider:
        clientId: "sa-cl2-03"
        clientSecret: "changeme"
      dim:
        clientId: "sa-cl2-05"
        clientSecret: "changeme"
        grantType: "client_credentials"
        scope: "openid"
        baseAddress: "https://ssi-dim-wallet-stub.mondragon-x.com"
        universalResolverAddress: "https://dev.uniresolver.io/"
        encryptionConfigs:
          index0:
            encryptionKey:
              "6cbaf47ee30c778088e6faa44e2f0eed98beda86db06c7d2e37e32ab78e14b33"
      issuerComponent:
      # You must specify the technical user with the required roles for the interaction with the SSI Credential Issuer
        clientId: "sa-cl2-04"
        clientSecret: "changeme"
        encryptionConfigs:
          index0:
            encryptionKey:
              "39ffab76f99ece1e4ac72f973d5c703737324a75c6445e84fa317a7833476a15"
      bpnDidResolver:
        # -- ApiKey for management endpoint of the bpnDidResolver. Secret-key 'bpndidresolver-api-key'.
        apiKey: ""
      onboardingServiceProvider:
        encryptionConfigs:
          index0:
            cipherMode: "CBC"
            paddingMode: "PKCS7"
            encryptionKey:
              "f7bc3d99f1ace73e7a75b794affbbc26206ab29909821a102aaccb2e95e45f7c"
          index1:
            encryptionKey:
              "8027152fe7a869c88acc86981760acd70ff1d660c2bd129eece94edef933caf7"
      invitation:
        encryptionConfigs:
          index0:
            encryptionKey:
              "d84fea29d6eac0fa51e36682b164e7d61693cd4202ed04306d2d9c5d46655e2c"
      mailing:
        encryptionConfigs:
          index0:
            encryptionKey:
              "d2e27d71b018cb36029184852f1baa3e26891be94718f77de4c7cc6c882fe317"
    mailing:
      # We need a valid SMTP server to send emails from the portal
      host: "smtp4dev"
      port: "25"
      user: "portal-user"
      senderEmail: "portal-admin@lksnext.com"
      password: "portal-password"
    portalmigrations:
      seeding:
        testData:
          enabled: true
      logging:
        default: "Debug"
    portalmaintenance:
      logging:
        default: "Debug"
    provisioning:
      # Seeds centralidp and sharedidp
      centralRealmId: "CX-Central" # El realm de centralidp que se va a utilizar
      serviceAccountClientPrefix: "sa" # Prefijo para los technical users (service accounts)
      centralIdentityProvider:
        clientId: "central-idp"
      sharedRealmClient:
        clientId: "central-idp"
      sharedRealm:
        smtpServer:
          host: "smtp4dev"
          port: "25"
          user: "portal-user"
          password: "portal-password"
          from: "portal-admin@lksnext.com"
          replyTo: "portal-replt@lksnext.com"
    # -- docs: https://portal-backend.mondragon-x.com/api/administration/swagger/index.html
    # https://portal-backend.mondragon-x.com/api/registration/swagger/index.html
    # https://portal-backend.mondragon-x.com/api/apps/swagger/index.html
    # https://portal-backend.mondragon-x.com/api/services/swagger/index.html
    # https://portal-backend.mondragon-x.com/api/notification/swagger/index.html
    ingress:
      enabled: true
      name: "portal-backend"
      annotations:
        # uncomment the following line for tls
        # cert-manager.io/cluster-issuer: "my-ca-issuer"
        nginx.ingress.kubernetes.io/use-regex: "true"
        nginx.ingress.kubernetes.io/enable-cors: "true"
        nginx.ingress.kubernetes.io/proxy-body-size: "8m"
        nginx.ingress.kubernetes.io/cors-allow-origin: "https://localhost:3000, https://*.mondragon-x.com, http://*.mondragon-x.com"
      # uncomment the following lines for tls
      tls:
        - secretName: "portal-backend.mondragon-x.com-tls"
          hosts:
            - "portal-backend.mondragon-x.com"
      hosts:
        - host: "portal-backend.mondragon-x.com"
          paths:
            - path: "/api/registration"
              pathType: "Prefix"
              backend:
                service: "registration-service"
                port: 8080
            - path: "/api/administration"
              pathType: "Prefix"
              backend:
                service: "administration-service"
                port: 8080
            - path: "/api/notification"
              pathType: "Prefix"
              backend:
                service: "notification-service"
                port: 8080
            - path: "/api/provisioning"
              pathType: "Prefix"
              backend:
                service: "provisioning-service"
                port: 8080
            - path: "/api/apps"
              pathType: "Prefix"
              backend:
                service: "marketplace-app-service"
                port: 8080
            - path: "/api/services"
              pathType: "Prefix"
              backend:
                service: "services-service"
                port: 8080

centralidp:
  enabled: true
  keycloak:
    nameOverride: "centralidp"
    replicaCount: 1
#    proxyHeaders: "X-Forwarded-For, X-Forwarded-Proto"
#    tls:
#      enabled: true
#      existingSecret: centralidp.mondragon-x.com-tls
#      usePem: true
    auth:
      adminPassword: "adminconsolepwcentralidp"
#      frontendUrl: https://centralidp.mondragon-x.com
    production: true
    proxy: "edge"
    postgresql:
      nameOverride: "centralidp-postgresql"
      auth:
        password: "dbpasswordcentralidp"
        postgresPassword: "dbpasswordcentralidp"
      architecture: standalone
      primary:
        persistence:
          enabled: true
    ingress:
      enabled: true
      ingressClassName: "nginx"
      hostname: "centralidp.mondragon-x.com"
      annotations:
        # uncomment the following line for tls
        # cert-manager.io/cluster-issuer: "my-ca-issuer"
        nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
        nginx.ingress.kubernetes.io/cors-allow-methods: "PUT, GET, POST, OPTIONS"
        nginx.ingress.kubernetes.io/cors-allow-origin: "https://centralidp.mondragon-x.com, http://centralidp.mondragon-x.com, https://*.mondragon-x.com"
        nginx.ingress.kubernetes.io/enable-cors: "true"
        nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
        nginx.ingress.kubernetes.io/proxy-buffering: "on"
        nginx.ingress.kubernetes.io/proxy-buffers-number: "20"
        nginx.ingress.kubernetes.io/use-regex: "true"
      tls: true
      extraTls:
        - secretName: centralidp.mondragon-x.com-tls
          hosts:
            - centralidp.mondragon-x.com
#      servicePort: https
#    extraEnvVars:
#      - name: PROXY_ADDRESS_FORWARDING
#        value: "true"
    # uncomment the following line for tls
    initContainers:
      - name: init-certs
        image: docker.io/bitnami/keycloak:25.0.6-debian-12-r0
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash"]
        args:
          - -ec
          - |-
            keytool -import -file "/certs/tls.crt" \
                    -keystore "/opt/bitnami/keycloak/certs/keycloak.truststore.jks" \
                    -storepass "${KEYCLOAK_SPI_TRUSTSTORE_PASSWORD}" \
                    -noprompt
        env:
          - name: KEYCLOAK_SPI_TRUSTSTORE_PASSWORD
            value: "changeit"
        volumeMounts:
          - name: certificates-c
            mountPath: /certs
          - name: shared-certs-c
            mountPath: "/opt/bitnami/keycloak/certs"
      - name: import
        image: docker.io/cdiezrodriguez/mondragon-iam:v4.0.3
        imagePullPolicy: IfNotPresent
        command:
          - sh
        args:
          - -c
          - |
            echo "Copying themes..."
            cp -R /import/themes/catenax-central/* /themes
        volumeMounts:
          - name: themes
            mountPath: /themes
    extraEnvVars:
      - name: KEYCLOAK_SPI_TRUSTSTORE_FILE
        value: "/opt/bitnami/keycloak/certs/keycloak.truststore.jks"
      - name: KEYCLOAK_SPI_TRUSTSTORE_PASSWORD
        value: "changeit"
    extraVolumes:
      - name: certificates-c
        secret:
          secretName: centralidp.mondragon-x.com-tls
          defaultMode: 420
      - name: shared-certs-c
        emptyDir: {}
      - name: themes
        emptyDir: {}
    extraVolumeMounts:
      - name: certificates-c
        mountPath: /certs
      - name: shared-certs-c
        mountPath: "/opt/bitnami/keycloak/certs"
      - name: themes
        mountPath: "/opt/bitnami/keycloak/themes/mondragonX"
  realmSeeding:
    enabled: true
#    sslRequired: "external"
#    keycloakServiceTls: true
#    keycloakServicePort: 443
    clients:
      registration:
        redirects:
          - https://portal.mondragon-x.com/*
      portal:
        rootUrl: https://portal.mondragon-x.com/home
        redirects:
          - https://portal.mondragon-x.com/*
      semantics:

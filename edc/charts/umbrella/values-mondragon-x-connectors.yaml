---
dataconsumerOne:
  enabled: true
  seedTestdata: false
  nameOverride: dataconsumer-1
  secrets:
    edc-wallet-secret: changeme
  tractusx-connector:
    nameOverride: dataconsumer-1-edc
    participant:
      id: BPNL00000003AZQP
    iatp:
      id: did:web:ssi-dim-wallet-stub.mondragon-x.com:BPNL00000003AZQP
      trustedIssuers:
        - did:web:ssi-dim-wallet-stub.mondragon-x.com:BPNL00000003CRHK
      sts:
        dim:
          url: https://ssi-dim-wallet-stub.mondragon-x.com/api/sts
        oauth:
          token_url: https://ssi-dim-wallet-stub.mondragon-x.com/oauth/token
          client:
            id: BPNL00000003AZQP
            secret_alias: edc-wallet-secret
    controlplane:
      env:
        TX_IAM_IATP_CREDENTIALSERVICE_URL: https://ssi-dim-wallet-stub.mondragon-x.com/api
        EDC_IAM_DID_WEB_USE_HTTPS: false
      bdrs:
        server:
          url: https://ssi-dim-wallet-stub.mondragon-x.com/api/v1/directory
      endpoints:
        management:
          authKey: TEST1
      ingresses:
        - enabled: true
          hostname: "dataconsumer-1-controlplane.mondragon-x.com"
          endpoints:
            - default
            - protocol
            - management
          className: "nginx"
          tls:
            enabled: true
            secretName: "dataconsumer-1-controlplane.mondragon-x.com-tls"
    dataplane:
      env:
        TX_IAM_IATP_CREDENTIALSERVICE_URL: https://ssi-dim-wallet-stub.mondragon-x.com/api
        EDC_IAM_DID_WEB_USE_HTTPS: false
      ingresses:
        - enabled: true
          hostname: "dataconsumer-1-dataplane.mondragon-x.com"
          endpoints:
            - default
            - public
          className: "nginx"
          tls:
            enabled: true
            secretName: "dataconsumer-1-dataplane.mondragon-x.com-tls"
      token:
        signer:
          privatekey_alias: tokenSignerPrivateKey
        verifier:
          publickey_alias: tokenSignerPublicKey
    postgresql:
      nameOverride: dataconsumer-1-db
      jdbcUrl: "jdbc:postgresql://{{ .Release.Name }}-dataconsumer-1-db:5432/edc"
      auth:
        password: "dbpassworddataconsumerone"
        postgresPassword: "dbpassworddataconsumerone"
    vault:
      hashicorp:
        url: http://edc-dataconsumer-1-vault:8200
      secretNames:
        transferProxyTokenSignerPrivateKey: tokenSignerPrivateKey
        transferProxyTokenSignerPublicKey: tokenSignerPublicKey
        transferProxyTokenEncryptionAesKey: tokenEncryptionAesKey

  vault:
    nameOverride: edc-dataconsumer-1-vault
    fullnameOverride: edc-dataconsumer-1-vault
    enabled: true
    server:
      postStart: []

  digital-twin-registry:
    enabled: false

  simple-data-backend:
    enabled: false

tx-data-provider:
  enabled: true
  seedTestdata: true
  backendUrl: http://{{ .Release.Name }}-dataprovider-submodelserver:8080
  registryUrl: http://{{ .Release.Name }}-dataprovider-dtr:8080/api/v3
  controlplanePublicUrl: http://{{ .Release.Name }}-dataprovider-edc-controlplane:8084
  controlplaneManagementUrl: http://{{ .Release.Name }}-dataprovider-edc-controlplane:8081
  dataplaneUrl: http://{{ .Release.Name }}-dataprovider-edc-dataplane:8081
  nameOverride: dataprovider
  secrets:
    edc-wallet-secret: changeme
  tractusx-connector:
    nameOverride: dataprovider-edc
    participant:
      id: BPNL00000003AYRE
    iatp:
      id: did:web:ssi-dim-wallet-stub.mondragon-x.com:BPNL00000003AYRE
      trustedIssuers:
        - did:web:ssi-dim-wallet-stub.mondragon-x.com:BPNL00000003CRHK
      sts:
        dim:
          url: https://ssi-dim-wallet-stub.mondragon-x.com/api/sts
        oauth:
          token_url: https://ssi-dim-wallet-stub.mondragon-x.com/oauth/token
          client:
            id: BPNL00000003AYRE
            secret_alias: edc-wallet-secret
    controlplane:
      env:
        TX_IAM_IATP_CREDENTIALSERVICE_URL: https://ssi-dim-wallet-stub.mondragon-x.com/api
        EDC_IAM_DID_WEB_USE_HTTPS: false
      bdrs:
        server:
          url: https://ssi-dim-wallet-stub.mondragon-x.com/api/v1/directory
      endpoints:
        management:
          authKey: TEST2
      ingresses:
        - enabled: true
          hostname: "dataprovider-controlplane.mondragon-x.com"
          endpoints:
            - default
            - protocol
            - management
          className: "nginx"
          tls:
            enabled: true
            secretName: "dataprovider-controlplane.mondragon-x.com-tls"
    dataplane:
      env:
        TX_IAM_IATP_CREDENTIALSERVICE_URL: https://ssi-dim-wallet-stub.mondragon-x.com/api
        EDC_IAM_DID_WEB_USE_HTTPS: false
      ingresses:
        - enabled: true
          hostname: "dataprovider-dataplane.mondragon-x.com"
          endpoints:
            - default
            - public
          className: "nginx"
          tls:
            enabled: true
            secretName: "dataprovider-dataplane.mondragon-x.com-tls"
      token:
        signer:
          privatekey_alias: tokenSignerPrivateKey
        verifier:
          publickey_alias: tokenSignerPublicKey
    postgresql:
      nameOverride: dataprovider-db
      jdbcUrl: "jdbc:postgresql://{{ .Release.Name }}-dataprovider-db:5432/edc"
      auth:
        password: "dbpasswordtxdataprovider"
        postgresPassword: "dbpasswordtxdataprovider"
    vault:
      hashicorp:
        url: http://edc-dataprovider-vault:8200
      secretNames:
        transferProxyTokenSignerPrivateKey: tokenSignerPrivateKey
        transferProxyTokenSignerPublicKey: tokenSignerPublicKey
        transferProxyTokenEncryptionAesKey: tokenEncryptionAesKey

  vault:
    nameOverride: edc-dataprovider-vault
    fullnameOverride: edc-dataprovider-vault
    enabled: true
    server:
      postStart: []

  digital-twin-registry:
    nameOverride: dataprovider-dtr
    postgresql:
      nameOverride: dataprovider-dtr-db
      auth:
        password: "dbpassworddtrdataprovider"
        existingSecret: dataprovider-secret-dtr-postgres-init
    registry:
      host: dataprovider-dtr.test
      ingress:
        tls: true

  simple-data-backend:
    nameOverride: dataprovider-submodelserver
    ingress:
      enabled: true
      className: "nginx"
      tls:
        - secretName: "dataprovider-submodelserver.mondragon-x.com-tls"
          hosts:
            - "dataprovider-submodelserver.mondragon-x.com"
      hosts:
        - host: "dataprovider-submodelserver.mondragon-x.com"
          paths:
            - path: "/"
              pathType: "Prefix"


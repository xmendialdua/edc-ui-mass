apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: poc-next-frontend
  namespace: poc-next
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: poc-next.51.178.94.25.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: poc-next-frontend
            port:
              number: 3001

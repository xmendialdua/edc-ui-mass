apiVersion: v1
kind: ServiceAccount
metadata:
  name: edc-ui-sa
  namespace: iflex-ui
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-reader
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: edc-ui-pod-reader
subjects:
- kind: ServiceAccount
  name: edc-ui-sa
  namespace: iflex-ui
roleRef:
  kind: ClusterRole
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
